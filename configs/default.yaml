# Default config for Cullen et al. reproduction
# Matches paper's anonymous code repo (not paper text, which has typos)
# H.1 Baseline (scaling experiments, Figs 1-2)
baseline:
  p: 53
  max_epochs: 100000
  checkpoint_interval: 100
  weight_decay: 0.00001  # 1e-5
  train_fraction: 0.4
  batch_size: 128
  seed: 0
  lr: 0.001

# Tracking experiments (Figs 3, 7-10)
tracking:
  p: 53
  K: 1024
  lr: 0.001
  weight_decay: 0.00001  # 1e-5, same as baseline
  batch_size: 128
  max_epochs: 100000
  checkpoint_interval: 100

# SGLD for LLC estimation (from paper's code, NOT paper text)
llc:
  sgld_lr: 0.0005  # 5e-4
  nbeta: 26.4      # default_nbeta(128) = 128/ln(128)
  localization: 5.0
  num_chains: 3
  num_draws: 500
  num_burnin_steps: 100

# Scaling experiments
scaling_p:
  primes: [53, 59, 61, 67, 71, 73, 79, 83, 89, 97]
  K_values: [600, 1000, 1400]

scaling_k:
  K_values: [200, 400, 600, 800, 1000, 1200, 1400, 1600]
  primes: [53, 61, 71]
